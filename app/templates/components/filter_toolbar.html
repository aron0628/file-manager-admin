<div class="p-4 border-b border-gray-200 bg-gray-50/50 flex flex-col md:flex-row gap-4 justify-between items-center">
  <!-- Search Bar -->
  <div class="relative w-full md:w-96">
    <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
      <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
      </svg>
    </span>
    <input
      type="text"
      name="search"
      value="{{ request.query_params.get('search', '') }}"
      placeholder="파일 검색..."
      class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md leading-5 bg-white placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
      hx-get="/api/partials/file-table"
      hx-trigger="keyup changed delay:300ms"
      hx-target="#file-table-container"
      hx-include="[name='file_type'],[name='date_range']"
      hx-indicator="#table-loading"
    />
  </div>

  <!-- Filters -->
  <div class="flex items-center gap-3 w-full md:w-auto">
    <select
      name="file_type"
      class="block w-full md:w-40 pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md"
      hx-get="/api/partials/file-table"
      hx-trigger="change"
      hx-target="#file-table-container"
      hx-include="[name='search'],[name='date_range']"
      hx-indicator="#table-loading"
    >
      <option value="" {% if not request.query_params.get('file_type') %}selected{% endif %}>전체 유형</option>
      <option value="pdf" {% if request.query_params.get('file_type') == 'pdf' %}selected{% endif %}>PDF 문서</option>
    </select>

    <select
      name="date_range"
      class="block w-full md:w-40 pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md"
      hx-get="/api/partials/file-table"
      hx-trigger="change"
      hx-target="#file-table-container"
      hx-include="[name='search'],[name='file_type']"
      hx-indicator="#table-loading"
    >
      <option value="30" {% if request.query_params.get('date_range', '30') == '30' %}selected{% endif %}>최근 30일</option>
      <option value="180" {% if request.query_params.get('date_range') == '180' %}selected{% endif %}>최근 6개월</option>
      <option value="365" {% if request.query_params.get('date_range') == '365' %}selected{% endif %}>최근 1년</option>
      <option value="" {% if request.query_params.get('date_range') == '' %}selected{% endif %}>전체 기간</option>
    </select>

    <!-- Loading indicator -->
    <span id="table-loading" class="htmx-indicator text-indigo-600">
      <svg class="animate-spin h-5 w-5" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
    </span>
  </div>
</div>
