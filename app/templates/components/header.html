<header class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">파일 관리</h1>
    <p class="text-sm text-gray-500">파일 업로드를 관리하고 정리하세요</p>
  </div>
  <div class="flex items-center gap-4">
    {% if request.state.user is defined and request.state.user %}
    <span class="text-sm text-gray-600">
      <span class="font-medium text-gray-900">{{ request.state.user.display_name }}</span>
    </span>
    <form action="/auth/logout" method="post" class="inline">
      <button
        type="submit"
        class="inline-flex items-center px-3 py-1.5 text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors"
      >
        <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
        </svg>
        로그아웃
      </button>
    </form>
    {% endif %}
    <button
      type="button"
      onclick="document.getElementById('upload-modal').classList.remove('hidden')"
      class="inline-flex items-center px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg transition-colors shadow-sm"
    >
      <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path d="M12 4v16m8-8H4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
      </svg>
      새 파일 업로드
    </button>
  </div>
</header>
