<div id="file-table-container">
  {% if files %}
  <div class="overflow-x-auto">
    <table class="min-w-full divide-y divide-gray-200" id="file-manager-table">
      <thead class="bg-gray-50">
        <tr>
          <!-- Checkbox placeholder header -->
          <th class="px-6 py-3 text-left" scope="col">
            <input type="checkbox" disabled class="h-4 w-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500 opacity-40 cursor-not-allowed"/>
          </th>
          <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider" scope="col">파일명</th>
          <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider" scope="col">카테고리</th>
          <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider" scope="col">크기</th>
          <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider" scope="col">업로더</th>
          <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider" scope="col">날짜</th>
          <th class="px-6 py-3 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider" scope="col">작업</th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-200">
        {% for file in files %}
          {% include "partials/file_row.html" %}
        {% endfor %}
      </tbody>
    </table>
  </div>

  {% include "partials/pagination.html" %}

  {% else %}
  {% include "partials/empty_state.html" %}

  {% include "partials/pagination.html" %}
  {% endif %}
</div>
