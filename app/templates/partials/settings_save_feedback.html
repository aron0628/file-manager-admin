{% if success %}
<span class="inline-flex items-center gap-1 text-emerald-600 font-medium animate-fade-in">
  <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
  </svg>
  저장됨
</span>
<script>
  (function() {
    var el = document.getElementById('feedback-{{ key }}');
    if (el) {
      setTimeout(function() { el.innerHTML = ''; }, 3000);
    }
  })();
</script>
{% else %}
<span class="inline-flex items-center gap-1 text-red-600 font-medium">
  <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
  </svg>
  오류
</span>
{% endif %}
