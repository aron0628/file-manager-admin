<!-- Account Edit Modal -->
<div id="account-edit-modal" class="hidden fixed inset-0 z-50 overflow-y-auto" aria-labelledby="account-edit-modal-title" role="dialog" aria-modal="true">
  <div class="flex min-h-screen items-center justify-center p-4">
    <div
      class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity"
      onclick="closeAccountEditModal()"
    ></div>

    <div class="relative bg-white rounded-xl shadow-xl w-full max-w-md z-10">
      <!-- Header -->
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
        <h2 id="account-edit-modal-title" class="text-lg font-semibold text-gray-900">계정 수정</h2>
        <button
          type="button"
          onclick="closeAccountEditModal()"
          class="text-gray-400 hover:text-gray-600 transition-colors"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
          </svg>
        </button>
      </div>

      <!-- Form -->
      <form
        id="account-edit-form"
        hx-put=""
        hx-target=""
        hx-swap="outerHTML"
        hx-on::after-request="handleAccountEditResponse(event)"
      >
        <div class="px-6 py-5 space-y-4">
          <!-- User ID (readonly) -->
          <div>
            <label for="account-edit-user-id" class="block text-sm font-medium text-gray-700 mb-1">사용자 ID</label>
            <input
              id="account-edit-user-id"
              type="text"
              class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm bg-gray-50 text-gray-500 sm:text-sm cursor-not-allowed"
              readonly
            />
          </div>

          <!-- Display Name -->
          <div>
            <label for="account-edit-display-name" class="block text-sm font-medium text-gray-700 mb-1">이름</label>
            <input
              id="account-edit-display-name"
              type="text"
              name="display_name"
              class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
              required
            />
          </div>

          <!-- Email -->
          <div>
            <label for="account-edit-email" class="block text-sm font-medium text-gray-700 mb-1">이메일</label>
            <input
              id="account-edit-email"
              type="email"
              name="email"
              class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
              required
            />
          </div>

          <!-- Role -->
          <div>
            <label for="account-edit-role" class="block text-sm font-medium text-gray-700 mb-1">역할</label>
            <select
              id="account-edit-role"
              name="role"
              class="block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md"
            >
              <option value="user">일반 사용자</option>
              <option value="admin">관리자</option>
            </select>
          </div>

          <!-- Active Status -->
          <div>
            <label for="account-edit-active" class="block text-sm font-medium text-gray-700 mb-1">상태</label>
            <select
              id="account-edit-active"
              name="is_active"
              class="block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md"
            >
              <option value="true">활성</option>
              <option value="false">비활성</option>
            </select>
          </div>

          <!-- Password -->
          <div>
            <label for="account-edit-password" class="block text-sm font-medium text-gray-700 mb-1">비밀번호 변경</label>
            <input
              id="account-edit-password"
              type="password"
              name="password"
              placeholder="변경 시에만 입력"
              class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
            />
            <p class="mt-1 text-xs text-gray-500">비워두면 기존 비밀번호가 유지됩니다. (최소 8자)</p>
          </div>

          <!-- Error area -->
          <div id="account-edit-error" class="hidden bg-red-50 border border-red-200 rounded-lg px-4 py-3">
            <p class="text-sm text-red-700" id="account-edit-error-text"></p>
          </div>
        </div>

        <!-- Footer -->
        <div class="px-6 py-4 border-t border-gray-200 flex items-center justify-end gap-3 bg-gray-50 rounded-b-xl">
          <button
            type="button"
            onclick="closeAccountEditModal()"
            class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors"
          >
            취소
          </button>
          <button
            type="submit"
            id="account-edit-submit-btn"
            class="inline-flex items-center px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
          >
            저장
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  function openAccountEditModal(userId, displayName, email, role, isActive) {
    const form = document.getElementById('account-edit-form');
    form.setAttribute('hx-put', '/api/accounts/' + userId);
    form.setAttribute('hx-target', '#account-row-' + userId);
    htmx.process(form);

    document.getElementById('account-edit-user-id').value = userId;
    document.getElementById('account-edit-display-name').value = displayName;
    document.getElementById('account-edit-email').value = email;

    const roleSelect = document.getElementById('account-edit-role');
    for (let i = 0; i < roleSelect.options.length; i++) {
      if (roleSelect.options[i].value === role) {
        roleSelect.selectedIndex = i;
        break;
      }
    }

    const activeSelect = document.getElementById('account-edit-active');
    activeSelect.value = isActive ? 'true' : 'false';

    document.getElementById('account-edit-password').value = '';
    document.getElementById('account-edit-error').classList.add('hidden');
    document.getElementById('account-edit-modal').classList.remove('hidden');
  }

  function closeAccountEditModal() {
    document.getElementById('account-edit-modal').classList.add('hidden');
  }

  function handleAccountEditResponse(event) {
    const btn = document.getElementById('account-edit-submit-btn');
    btn.disabled = false;

    if (event.detail.successful) {
      closeAccountEditModal();
    } else {
      const errorDiv = document.getElementById('account-edit-error');
      const errorText = document.getElementById('account-edit-error-text');
      try {
        const resp = JSON.parse(event.detail.xhr.responseText);
        errorText.textContent = resp.detail || '저장 중 오류가 발생했습니다.';
      } catch {
        errorText.textContent = '저장 중 오류가 발생했습니다. (HTTP ' + event.detail.xhr.status + ')';
      }
      errorDiv.classList.remove('hidden');
    }
  }

  document.getElementById('account-edit-form').addEventListener('htmx:beforeRequest', function() {
    document.getElementById('account-edit-submit-btn').disabled = true;
  });
</script>
