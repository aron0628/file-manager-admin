{% extends "base.html" %}

{% block title %}시스템 설정 | 모바일팩토리{% endblock %}

{% block content %}
<!-- Header -->
<header class="mb-12 flex flex-col md:flex-row md:items-end md:justify-between gap-4">
  <div>
    <h1 class="text-4xl font-extrabold tracking-tight text-[#191c1e] mb-2 font-headline">시스템 설정</h1>
    <p class="text-[#464554]">에이전트 동작 및 기능 플래그를 설정합니다</p>
  </div>
  <div>
    <button
      type="button"
      hx-post="/api/settings/seed"
      hx-target="#settings-form-container"
      hx-swap="innerHTML"
      class="inline-flex items-center px-5 py-2.5 bg-white border border-slate-200 text-slate-600 text-sm font-semibold rounded-lg shadow-sm hover:bg-slate-50 hover:border-slate-300 active:scale-95 transition-transform"
    >
      <span class="material-symbols-outlined text-[18px] mr-2">restart_alt</span>
      기본값 초기화
    </button>
  </div>
</header>

<!-- Settings Form -->
<div id="settings-form-container">
  {% include "partials/settings_form.html" %}
</div>
{% endblock %}
