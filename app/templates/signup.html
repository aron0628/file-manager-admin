{% extends "auth_base.html" %}

{% block title %}회원가입 | File Manager{% endblock %}

{% block auth_content %}
<!-- Header -->
<div class="mb-10 text-center">
  <div class="inline-flex items-center justify-center mb-6">
    <span class="material-symbols-outlined text-[#4648d4] text-4xl">cloud_done</span>
    <span class="ml-2 text-2xl font-extrabold tracking-tight text-indigo-700 font-headline">File Manager</span>
  </div>
  <h1 class="font-headline font-extrabold text-[#191c1e] tracking-tight text-4xl mb-3">Create Account</h1>
  <p class="text-[#464554]">파일 관리 시스템 계정을 생성하세요.</p>
</div>

<!-- Form Card -->
<div class="bg-white rounded-xl p-8 md:p-10 shadow-[0_32px_64px_-12px_rgba(25,28,30,0.04)] ring-1 ring-[#c7c4d7]/10">
  {% if error %}
  <div class="mb-6 p-3 rounded-lg bg-red-50 text-red-700 text-sm">
    {{ error }}
  </div>
  {% endif %}

  <form action="/auth/signup" method="post" class="space-y-6">
    <!-- User ID -->
    <div class="space-y-2">
      <label class="block text-[0.7rem] font-bold uppercase tracking-widest text-[#464554] px-1" for="user_id">사용자 ID</label>
      <input class="w-full bg-[#f2f4f6] border-none rounded-xl px-4 py-3.5 text-[#191c1e] placeholder:text-[#767586]/50 focus:ring-2 focus:ring-[#4648d4]/40 transition-all duration-200 outline-none" id="user_id" name="user_id" placeholder="user123" type="text" required/>
    </div>

    <!-- Display Name -->
    <div class="space-y-2">
      <label class="block text-[0.7rem] font-bold uppercase tracking-widest text-[#464554] px-1" for="display_name">이름</label>
      <input class="w-full bg-[#f2f4f6] border-none rounded-xl px-4 py-3.5 text-[#191c1e] placeholder:text-[#767586]/50 focus:ring-2 focus:ring-[#4648d4]/40 transition-all duration-200 outline-none" id="display_name" name="display_name" placeholder="홍길동" type="text" required/>
    </div>

    <!-- Email -->
    <div class="space-y-2">
      <label class="block text-[0.7rem] font-bold uppercase tracking-widest text-[#464554] px-1" for="email">이메일</label>
      <input class="w-full bg-[#f2f4f6] border-none rounded-xl px-4 py-3.5 text-[#191c1e] placeholder:text-[#767586]/50 focus:ring-2 focus:ring-[#4648d4]/40 transition-all duration-200 outline-none" id="email" name="email" placeholder="name@company.com" type="email" required/>
    </div>

    <!-- Password -->
    <div class="space-y-2">
      <label class="block text-[0.7rem] font-bold uppercase tracking-widest text-[#464554] px-1" for="password">비밀번호</label>
      <input class="w-full bg-[#f2f4f6] border-none rounded-xl px-4 py-3.5 text-[#191c1e] placeholder:text-[#767586]/50 focus:ring-2 focus:ring-[#4648d4]/40 transition-all duration-200 outline-none" id="password" name="password" placeholder="••••••••" type="password" required/>
      <p class="text-[11px] text-[#767586] px-1">비밀번호는 최소 8자 이상이어야 합니다.</p>
    </div>

    <!-- Submit -->
    <div class="pt-4">
      <button class="w-full bg-gradient-to-br from-[#4648d4] to-[#6063ee] text-white font-semibold py-4 rounded-lg shadow-lg shadow-[#4648d4]/20 hover:opacity-90 active:scale-[0.98] transition-all duration-200" type="submit">
        회원가입
      </button>
    </div>
  </form>
</div>

<!-- Footer links -->
<div class="mt-8 text-center">
  <p class="text-[#464554] text-sm">
    이미 계정이 있으신가요?
    <a class="text-[#4648d4] font-bold hover:underline underline-offset-4 ml-1" href="/login">로그인</a>
  </p>
</div>
{% endblock %}
