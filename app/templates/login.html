{% extends "auth_base.html" %}

{% block title %}로그인 | 모바일팩토리{% endblock %}

{% block auth_content %}
<!-- Header -->
<div class="mb-10 text-center">
  <div class="inline-flex items-center justify-center mb-6">
    <svg xmlns="http://www.w3.org/2000/svg" width="37" height="33" viewBox="0 0 37.01 32.838">
      <g transform="translate(0 0.809)">
        <path d="M17.5,30H10.327V20.749h2.285v-3.06h-2.3l.013-1.794a1.145,1.145,0,0,1,.212-.818,1.369,1.369,0,0,1,.93-.263,4.936,4.936,0,0,1,1.29.224V12.273a7.524,7.524,0,0,0-2.54-.519,3.746,3.746,0,0,0-2.415.7,2.776,2.776,0,0,0-1,1.888c-.053.347-.084,1.475-.092,3.351H5.424v3.06h1.29V30H0V0L7.5,3.751V0l10,5V30Z" transform="translate(19.01)" fill="#f39638" stroke="rgba(0,0,0,0)" stroke-miterlimit="10" stroke-width="1"/>
        <path d="M0,29.737H3.612v1.655A6.156,6.156,0,0,1,5.666,29.87a5.983,5.983,0,0,1,2.462-.5,4.571,4.571,0,0,1,2.429.661A4.786,4.786,0,0,1,12.3,31.96a5.826,5.826,0,0,1,2.106-1.931,5.734,5.734,0,0,1,2.727-.661,5.052,5.052,0,0,1,2.694.712,4.113,4.113,0,0,1,1.67,1.858,9.93,9.93,0,0,1,.508,3.73v8.408H18.393V36.809a6.175,6.175,0,0,0-.611-3.3,2.1,2.1,0,0,0-1.834-.862,2.8,2.8,0,0,0-1.667.527,3.117,3.117,0,0,0-1.1,1.454,8.97,8.97,0,0,0-.359,2.981v6.464H9.215V37.138a9.757,9.757,0,0,0-.284-2.784,2.521,2.521,0,0,0-.853-1.283A2.243,2.243,0,0,0,6.7,32.648a2.711,2.711,0,0,0-1.632.534,3.172,3.172,0,0,0-1.1,1.494A9.223,9.223,0,0,0,3.612,37.7v6.371H0Z" transform="translate(0 -12.047)" fill="#006a6f"/>
      </g>
    </svg>
    <span class="ml-2 text-2xl font-extrabold tracking-tight text-[#006a6f] font-headline">모바일팩토리</span>
  </div>
  <p class="text-[#464554]">안전한 파일 관리 시스템에 로그인하세요.</p>
</div>

<!-- Form Card -->
<div class="bg-white rounded-xl p-8 md:p-10 shadow-[0_32px_64px_-12px_rgba(25,28,30,0.04)] ring-1 ring-[#c7c4d7]/10">
  {% if error %}
  <div class="mb-6 p-3 rounded-lg bg-red-50 text-red-700 text-sm">
    {{ error }}
  </div>
  {% endif %}

  <form action="/auth/login" method="post" class="space-y-6">
    <!-- Login ID -->
    <div class="space-y-2">
      <label class="block text-[0.7rem] font-bold uppercase tracking-widest text-[#464554] px-1" for="login_id">사용자 ID 또는 이메일</label>
      <input class="w-full bg-[#f2f4f6] border-none rounded-xl px-4 py-3.5 text-[#191c1e] placeholder:text-[#767586]/50 focus:ring-2 focus:ring-[#4648d4]/40 transition-all duration-200 outline-none" id="login_id" name="login_id" placeholder="user123 또는 name@company.com" type="text" required/>
    </div>

    <!-- Password -->
    <div class="space-y-2">
      <div class="flex justify-between items-center px-1">
        <label class="block text-[0.7rem] font-bold uppercase tracking-widest text-[#464554]" for="password">비밀번호</label>
      </div>
      <input class="w-full bg-[#f2f4f6] border-none rounded-xl px-4 py-3.5 text-[#191c1e] placeholder:text-[#767586]/50 focus:ring-2 focus:ring-[#4648d4]/40 transition-all duration-200 outline-none" id="password" name="password" placeholder="••••••••" type="password" required/>
    </div>

    <!-- Submit -->
    <div class="pt-4">
      <button class="w-full bg-gradient-to-br from-[#4648d4] to-[#6063ee] text-white font-semibold py-4 rounded-lg shadow-lg shadow-[#4648d4]/20 hover:opacity-90 active:scale-[0.98] transition-all duration-200" type="submit">
        로그인
      </button>
    </div>
  </form>
</div>

<!-- Footer links -->
<div class="mt-8 text-center">
  <p class="text-[#464554] text-sm">
    계정이 없으신가요?
    <a class="text-[#4648d4] font-bold hover:underline underline-offset-4 ml-1" href="/signup">회원가입</a>
  </p>
</div>
{% endblock %}
