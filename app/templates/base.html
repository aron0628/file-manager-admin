<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>{% block title %}관리자 포털 - 파일 관리{% endblock %}</title>
  <!-- Tailwind CSS v3 CDN with plugins -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/json-enc.js"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f9fafb;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

    /* HTMX loading indicator */
    .htmx-request .htmx-indicator { display: inline-block; }
    .htmx-indicator { display: none; }

    /* 글로벌 로딩 오버레이 */
    #global-loading {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(255, 255, 255, 0.5);
      align-items: center;
      justify-content: center;
    }
    #global-loading.active {
      display: flex;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="text-gray-900 antialiased">

{% block body %}
<main class="min-h-screen p-4 md:p-8">
  <div class="max-w-7xl mx-auto">
    {% block content %}{% endblock %}
  </div>
</main>
{% endblock %}

<!-- Upload Modal -->
{% include "partials/upload_modal.html" %}

<!-- Edit Modal -->
{% include "partials/edit_modal.html" %}

<!-- 글로벌 로딩 오버레이 -->
<div id="global-loading">
  <div class="flex flex-col items-center gap-2">
    <svg class="animate-spin h-8 w-8 text-indigo-600" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
    </svg>
    <span class="text-sm text-gray-500 font-medium">처리 중...</span>
  </div>
</div>

<script>
  // 글로벌 HTMX 로딩 오버레이: 검색/필터 제외, 삭제/편집/업로드/페이지네이션에 표시
  document.body.addEventListener('htmx:beforeRequest', function(e) {
    const trigger = e.detail.elt;
    // 검색 입력과 필터 드롭다운은 자체 인디케이터 사용 → 글로벌 스피너 제외
    if (trigger.matches('input[name="search"], select[name="file_type"], select[name="date_range"]')) return;
    // 파싱 상태 폴링(every 3s)도 제외
    if (trigger.id && trigger.id.startsWith('parse-status-')) return;
    document.getElementById('global-loading').classList.add('active');
  });
  document.body.addEventListener('htmx:afterRequest', function() {
    document.getElementById('global-loading').classList.remove('active');
  });
  document.body.addEventListener('htmx:responseError', function() {
    document.getElementById('global-loading').classList.remove('active');
  });
</script>

{% block scripts %}{% endblock %}
</body>
</html>
