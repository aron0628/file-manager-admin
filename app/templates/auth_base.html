<!DOCTYPE html>
<html class="light" lang="ko">
<head>
  {% include "partials/_base_shared.html" %}
  <title>{% block title %}CloudVault{% endblock %}</title>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-headline { font-family: 'Manrope', sans-serif; }
  </style>
</head>
<body class="bg-[#f2f4f6] text-[#191c1e] min-h-screen flex flex-col">
<main class="flex-grow flex items-center justify-center px-6 py-20 relative overflow-hidden">
  <!-- Background blur decorations -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-[10%] -left-[5%] w-[40%] h-[40%] bg-[#c0c1ff]/20 blur-[120px] rounded-full"></div>
    <div class="absolute top-[60%] -right-[10%] w-[50%] h-[50%] bg-[#c0c1ff]/20 blur-[120px] rounded-full"></div>
  </div>
  <!-- Content -->
  <div class="relative w-full max-w-[480px]">
    {% block auth_content %}{% endblock %}
  </div>
</main>
<!-- Footer -->
<footer class="w-full py-8 border-t border-gray-200 bg-gray-50">
  <div class="flex flex-col md:flex-row justify-between items-center gap-4 px-8 max-w-7xl mx-auto">
    <div class="text-lg font-bold text-gray-900 font-headline">모바일팩토리</div>
    <p class="text-xs uppercase tracking-widest font-medium text-gray-500">&copy; 2026 모바일팩토리</p>
  </div>
</footer>
</body>
</html>
